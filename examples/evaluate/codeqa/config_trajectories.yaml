  dump_dir: /gpfs/projects/p32992/VAGEN/rollouts/codeqa_trajectories_v2
  default_max_turns: 2

run:
  backend: "vllm"
  base_seed: 0
  max_concurrent_jobs: 4
  resume: skip_completed
  live_summary: true

backends:
  vllm:
    base_url: "http://127.0.0.1:8000/v1"
    api_key: "EMPTY"
    model: "Qwen/Qwen3-VL-8B-Instruct"
    max_concurrency: 2
    max_retries: 6
    min_backoff: 1.0
    max_backoff: 16.0
